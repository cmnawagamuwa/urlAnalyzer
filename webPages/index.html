<html>
    <head>
        <title>URL Analyzer</title>
        <style>
            body {
                font-family: Arial, sans-serif;
                max-width: 800px;
                margin: 40px auto;
                padding: 0 20px;
                background-color: #f5f5f5;
                color: #333;
            }

            h1 {
                color: #2c3e50;
                border-bottom: 2px solid #3498db;
                padding-bottom: 10px;
            }

            input[type="text"] {
                width: 100%;
                padding: 10px;
                font-size: 15px;
                border: 1px solid #ccc;
                border-radius: 5px;
                box-sizing: border-box;
                margin-top: 5px;
            }

            button {
                margin-top: 12px;
                padding: 10px 24px;
                background-color: #3498db;
                color: white;
                border: none;
                border-radius: 5px;
                font-size: 15px;
                cursor: pointer;
            }

            button:hover {
                background-color: #2980b9;
            }

            #result {
                margin-top: 24px;
            }

            .grid {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 12px;
            }

            .card {
                background-color: #fff;
                border: 1px solid #ddd;
                border-radius: 6px;
                padding: 16px;
            }

            .card.full {
                grid-column: 1 / -1;
            }

            .card .label {
                display: block;
                font-size: 12px;
                color: #888;
                text-transform: uppercase;
                letter-spacing: 0.5px;
                margin-bottom: 6px;
            }

            .card .value {
                display: block;
                font-size: 15px;
                color: #2c3e50;
                word-break: break-all;
            }

            .card pre.links {
                margin: 0;
                font-size: 13px;
                line-height: 1.7;
                white-space: pre-wrap;
                color: #2c3e50;
            }
        </style>
    </head>
    <body>

        <h1>URL Analyzer</h1>

        <form method="POST" action="/submit">
            <label for="url">Enter a URL to analyze:</label>
            <input type="text" id="url" name="url" placeholder="https://example.com" required>
            <button type="submit">Analyze</button>
        </form>
    </body>
</html>
